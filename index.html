<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InFlow Band Manager (Ultimate Edition)</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #ff3366;
            --text-color: #e0e0e0;
            --border-color: #333;
            --success-color: #00cc66;
            --warning-color: #ffcc00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #fff;
        }

        h1 span {
            color: var(--accent-color);
        }

        .cloud-bar {
            background: #1e1e1e;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-color);
        }

        .cloud-bar button {
            padding: 4px 10px;
            font-size: 0.8rem;
            background: var(--accent-color);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 3px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .tab-content {
            display: none;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        input, select, button {
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 4px;
        }

        input:focus, select:focus {
            outline: 1px solid var(--accent-color);
        }

        button.add-btn {
            background: var(--accent-color);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        button.add-btn:hover {
            background: #e02253;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: rgba(255, 33, 102, 0.1);
            color: var(--accent-color);
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .owner-tag {
            background-color: rgba(255, 51, 102, 0.15);
            color: var(--accent-color);
            border: 1px solid rgba(255, 51, 102, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }

        .priority-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            text-align: center;
            display: inline-block;
        }
        
        .p-high { background-color: #cc0033; }
        .p-medium { background-color: var(--warning-color); color: #121212; }
        .p-low { background-color: var(--success-color); }

        tr.row-p-high { border-left: 4px solid #cc0033; }
        tr.row-p-medium { border-left: 4px solid var(--warning-color); }
        tr.row-p-low { border-left: 4px solid var(--success-color); }

        .type-income { color: var(--success-color); font-weight: bold; }
        .type-expense { color: var(--accent-color); font-weight: bold; }

        .finance-summary {
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .comment-cell {
            background: rgba(255,255,255,0.03);
            border: 1px dashed #555;
            padding: 6px;
            color: #ccc;
            font-size: 0.9rem;
            border-radius: 4px;
            min-width: 150px;
        }

        .comment-cell:focus {
            background: #2a2a2a;
            outline: 1px solid var(--accent-color);
            color: #fff;
        }

        .delete-btn {
            background: #cc0000;
            color: #fff;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .delete-btn:hover {
            background: #ff0000;
        }
        
        .event-tag {
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: #444;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>INFLOW <span>| Band Manager</span></h1>
        <div class="cloud-bar">
            <span>Google Диск: <strong id="gdStatus" style="color: #ffcc00;">🔘 Не настроен</strong></span>
            <button id="btnCloudAuth" onclick="handleCloudAuth()" style="display:none;">Войти</button>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tasks', this)">Задачи и Сроки</button>
        <button class="tab-btn" onclick="switchTab('calendar', this)">Календарь</button>
        <button class="tab-btn" onclick="switchTab('expenses', this)">Учет Финансов</button>
        <button class="tab-btn" onclick="switchTab('archive', this)">📦 Архив Задач</button>
        <button class="tab-btn" onclick="switchTab('settings', this)">⚙️ Настройки</button>
    </div>

    <div id="tasks" class="tab-content active">
        <h2>Менеджер задач</h2>
        <div class="form-group" style="grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)) 2fr 80px;">
            <input type="text" id="taskName" placeholder="Задача">
            <input type="text" id="taskOwner" placeholder="Кто делает (Имя)">
            <input type="date" id="taskDeadline">
            <select id="taskStatus">
                <option value="Не начато">Не начато</option>
                <option value="В процессе">В процессе</option>
                <option value="Ожидание">Ожидание</option>
                <option value="Готово">Готово</option>
            </select>
            <select id="taskPriority">
                <option value="Низкий">Низкий</option>
                <option value="Средний">Средний</option>
                <option value="Высокий">Высокий</option>
            </select>
            <input type="text" id="taskComment" placeholder="Заметки">
            <button class="add-btn" onclick="addTask()">+</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 20%;">Задача</th>
                    <th style="width: 14%;">Ответственный</th>
                    <th style="width: 12%;">Дедлайн</th>
                    <th style="width: 12%;">Статус</th>
                    <th style="width: 10%;">Важность</th>
                    <th style="width: 24%;">Комментарий</th>
                    <th style="width: 8%;"></th>
                </tr>
            </thead>
            <tbody id="tasksTableBody"></tbody>
        </table>
    </div>

    <div id="calendar" class="tab-content">
        <h2>Календарь мероприятий</h2>
        <div class="form-group" style="grid-template-columns: 150px 1fr 1fr 2fr 80px;">
            <input type="date" id="eventDate">
            <input type="text" id="eventName" placeholder="Название (Gig, Fest...)">
            <input type="text" id="eventLocation" placeholder="Место / Клуб">
            <input type="text" id="eventComment" placeholder="Детали (Сет-лист, чеклист...)">
            <button class="add-btn" onclick="addEvent()">+</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 12%;">Дата</th>
                    <th style="width: 20%;">Событие</th>
                    <th style="width: 18%;">Где</th>
                    <th style="width: 42%;">Комментарий / Детали</th>
                    <th style="width: 8%;"></th>
                </tr>
            </thead>
            <tbody id="calendarTableBody"></tbody>
        </table>
    </div>

    <div id="expenses" class="tab-content">
        <h2>Учет финансов (Доходы и Расходы)</h2>
        <div class="form-group" style="grid-template-columns: 120px 120px 160px 1fr 120px 1fr 60px;">
            <input type="date" id="expDate">
            <select id="expType
