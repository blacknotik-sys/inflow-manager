<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFlow Band Manager (Split Archive Edition)</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #ff3366;
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
            color: #fff;
        }

        h1 span {
            color: var(--accent-color);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1 1 auto;
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .tab-content {
            display: none;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .form-group input, .form-group select {
            flex: 1 1 150px;
            min-width: 110px;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            min-height: 44px;
        }

        .form-group input[placeholder="Задача"], 
        .form-group input[placeholder="Заметки"],
        .form-group input[placeholder="Детали (Сет-лист, чеклист...)"] {
            flex: 2 1 220px;
        }

        .form-group button.add-btn {
            flex: 1 1 100%;
            background: var(--accent-color);
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 12px;
            min-height: 44px;
        }

        input:focus, select:focus {
            outline: 2px solid var(--accent-color);
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 850px;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            font-size: 0.95rem;
        }

        th {
            background-color: rgba(255, 33, 102, 0.1);
            color: var(--accent-color);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .comment-cell {
            background: rgba(255,255,255,0.03);
            border: 1px dashed #555;
            padding: 8px;
            color: #ccc;
            font-size: 0.9rem;
            border-radius: 4px;
            min-width: 160px;
            word-break: break-word;
        }

        .comment-cell:focus {
            background: #2a2a2a;
            outline: 1px solid var(--accent-color);
            color: #fff;
        }

        .complete-btn {
            background: #28a745;
            color: #fff;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            margin-right: 5px;
            font-weight: bold;
            min-height: 38px;
        }

        .delete-btn {
            background: #cc0000;
            color: #fff;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            min-height: 38px;
        }

        .total-box {
            margin-top: 20px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }
        
        .total-box span {
            color: var(--accent-color);
        }

        .event-tag {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: #444;
            color: #fff;
            font-weight: bold;
        }

        .archived-tr {
            opacity: 0.6;
        }

        .settings-card {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .settings-card label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .settings-card input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            margin-top: 8px;
            border-radius: 6px;
            box-sizing: border-box;
        }
