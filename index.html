<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFlow Band Manager (Perfect Mobile & Web)</title>
    <style>
        /* Глобальный сброс для предотвращения невидимых наложений элементов */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #ff3366;
            --text-color: #e0e0e0;
            --border-color: #333;
            --success-color: #28a745;
            --danger-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
            color: #fff;
        }

        h1 span {
            color: var(--accent-color);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1 1 auto;
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .tab-content {
            display: none;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .form-group input, .form-group select {
            flex: 1 1 140px;
            min-width: 110px;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            font-size: 1rem;
            min-height: 44px;
        }

        .form-group input[placeholder="Задача"], 
        .form-group input[placeholder="Заметки"],
        .form-group input[placeholder="Описание транзакции"],
        .form-group input[placeholder="Детали (Сет-лист, чеклист...)"] {
            flex: 2 1 220px;
        }

        .form-group button.add-btn {
            flex: 1 1 100%;
            background: var(--accent-color);
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 12px;
            min-height: 44px;
        }

        input:focus, select:focus {
            outline: 2px solid var(--accent-color);
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 850px;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            font-size: 0.95rem;
        }

        th {
            background-color: rgba(255, 33, 102, 0.1);
            color: var(--accent-color);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .comment-cell {
            background: rgba(255,255,255,0.03);
            border: 1px dashed #555;
            padding: 8px;
            color: #ccc;
            font-size: 0.9rem;
            border-radius: 4px;
            min-width: 160px;
            word-break: break-word;
        }

        .comment-cell:focus {
            background: #2a2a2a;
            outline: 1px solid var(--accent-color);
            color: #fff;
        }

        .complete-btn {
            background: var(--success-color);
            color: #fff;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            margin-right: 5px;
            font-weight: bold;
            min-height: 38px;
        }

        .delete-btn {
            background: var(--danger-color);
            color: #fff;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            min-height: 38px;
        }

        .finance-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .summary-box {
            background: #222;
            padding: 12px 20px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .summary-box.income-box span { color: var(--success-color); }
        .summary-box.expense-box span { color: var(--danger-color); }
        .summary-box.balance-box span { color: #00fff0; }

        .event-tag {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: #444;
            color: #fff;
            font-weight: bold;
        }

        .archived-tr { opacity: 0.6; }
        .income-tr { background-color: rgba(40, 167, 69, 0.03); }
        .expense-tr { background-color: rgba(220, 53, 69, 0.03); }

        .settings-card {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .settings-card label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .settings-card input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            margin-top: 8px;
            border-radius: 6px;
        }

        /* --- ТОЧЕЧНАЯ МОБИЛЬНАЯ ОПТИМИЗАЦИЯ (ВЕБ-ВЕРСИЯ НЕ ИЗМЕНИЛАСЬ) --- */
        @media (max-width: 768px) {
            body { padding: 8px; }
            h1 { font-size: 1.6rem; }
            
            .tabs {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .tabs button:nth-child(5) {
                grid-column: span 2;
            }

            /* Изолируем контекст наложения формы ввода над таблицами */
            .form-group {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
                position: relative;
                z-index: 10;
            }
            
            /* Фиксируем 16px для предотвращения системного зума Chrome Mobile */
            .form-group input, 
            .form-group select, 
            .form-group button.add-btn {
                width: 100% !important;
                flex: 1 1 auto !important;
                display: block;
                font-size: 16px !important; 
            }
            
            .table-wrapper {
                position: relative;
                z-index: 1;
            }

            .comment-cell {
                font-size: 16px !important;
                -webkit-user-select: text;
                user-select: text;
            }

            .finance-summary {
                flex-direction: column;
                align-items: stretch;
            }
            .summary-box { text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>INFLOW <span>
