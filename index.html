<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InFlow Band Manager (Stabilized Edition)</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #ff3366;
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #fff;
        }

        h1 span {
            color: var(--accent-color);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .tab-content {
            display: none;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tab-content.active {
            display: block;
        }

        /* Гибкая и стабильная форма ввода вместо жесткого Grid */
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .form-group input, .form-group select {
            flex: 1 1 160px;
            min-width: 130px;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Увеличенная зона для заметок и названий */
        .form-group input[placeholder="Задача"], 
        .form-group input[placeholder="Заметки"],
        .form-group input[placeholder="Детали (Сет-лист, чеклист...)"] {
            flex: 2 1 250px;
        }

        .form-group button.add-btn {
            flex: 0 0 60px;
            background: var(--accent-color);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 10px;
        }

        .form-group button.add-btn:hover {
            background: #e02253;
        }

        input:focus, select:focus {
            outline: 1px solid var(--accent-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: rgba(255, 33, 102, 0.1);
            color: var(--accent-color);
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .comment-cell {
            background: rgba(255,255,255,0.03);
            border: 1px dashed #555;
            padding: 6px;
            color: #ccc;
            font-size: 0.9rem;
            border-radius: 4px;
            min-width: 150px;
        }

        .comment-cell:focus {
            background: #2a2a2a;
            outline: 1px solid var(--accent-color);
            color: #fff;
        }

        .delete-btn {
            background: #cc0000;
            color: #fff;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .delete-btn:hover {
            background: #ff0000;
        }

        .total-box {
            margin-top: 20px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }
        
        .total-box span {
            color: var(--accent-color);
        }

        .event-tag {
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: #444;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>INFLOW <span>| Band Manager</span></h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tasks', this)">Задачи и Сроки</button>
        <button class="tab-btn" onclick="switchTab('calendar', this)">Календарь</button>
        <button class="tab-btn" onclick="switchTab('expenses', this)">Учет Расходов</button>
    </div>

    <div id="tasks" class="tab-content active">
        <h2>Менеджер задач</h2>
        <div class="form-group">
            <input type="text" id="taskName" placeholder="Задача">
            <input type="text" id="taskOwner" placeholder="Кто делает">
            <input type="date" id="taskDeadline">
            <select id="taskStatus">
                <option value="Не начато">Не начато</option>
                <option value="В процессе">В процессе</option>
                <option value="Ожидание">Ожидание</option>
                <option value="Готово">Готово</option>
            </select>
            <select id="taskPriority">
                <option value="Низкий">Низкий</option>
                <option value="Средний">Средний</option>
                <option value="Высокий">Высокий</option>
            </select>
            <input type="text" id="taskComment" placeholder="Заметки">
            <button class="add-btn" onclick="addTask()">+</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 20%;">Задача</th>
                    <th style="width: 15%;">Кто</th>
                    <th style="width: 12%;">Дедлайн</th>
                    <th style="width: 12%;">Статус</th>
                    <th style="width: 10%;">Приоритет</th>
                    <th style="width: 23%;">Комментарий</th>
                    <th style="width: 8%;"></th>
                </tr>
            </thead>
            <tbody id="tasksTableBody"></tbody>
        </table>
    </div>

    <div id="calendar" class="tab-content">
        <h2>Календарь мероприятий</h2>
        <div class="form-group">
            <input type="date" id="eventDate">
            <input type="text" id="eventName" placeholder="Название (Gig, Fest...)">
            <input type="text" id="eventLocation" placeholder="Место / Клуб">
            <input type="text" id="eventComment" placeholder="Детали (Сет-лист, чеклист...)">
            <button class="add-btn" onclick="addEvent()">+</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 12%;">Дата</th>
                    <th style="width: 20%;">Событие</th>
                    <th style="width: 18%;">Где</th>
                    <th style="width: 42%;">Комментарий / Детали</th>
                    <th style="width: 8%;"></th>
                </tr>
            </thead>
            <tbody id="calendarTableBody"></tbody>
        </table>
    </div>

    <div id="expenses" class="tab-content">
        <h2>Контроль бюджета</h2>
        <div class="form-group">
            <input type="date" id="expDate">
            <select id="expCategory">
                <option value="Маркетинг">Маркетинг</option>
                <option value="Продвижение">Продвижение</option>
                <option value="Студия">Студия</option>
                <option value="Оборудование">Оборудование</option>
                <option value="Репетиции">Репетиции</option>
                <option value="Другое">Другое</option>
            </select>
            <input type="text" id="expDesc" placeholder="Описание">
            <input type="number" id="expAmount" placeholder="Сумма (MDL)">
            <input type="text" id="expPaidBy" placeholder="Кто оплатил">
            <button class="add-btn" onclick="addExpense()">+</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Категория</th>
                    <th>Описание</th>
                    <th>Сумма</th>
                    <th>Кто оплатил</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="expensesTableBody"></tbody>
        </table>
        <div class="total-box">Всего потрачено: <span id="totalAmount">0</span> MDL</div>
    </div>
</div>

<script>
    // Конфигурация Telegram 
    const TG_TOKEN = "8745857091:AAHMHa16tHqhmESPN4-LAKI6R5cVW7KOSyM";
    const TG_CHAT_ID = "-1002074840667";

    function sendTelegram(text) {
        const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}`;
        fetch(url)
            .then(res => { 
                if(!res.ok) {
                    res.json().then(errData => {
                        console.error("Telegram API Error:", errData.description);
                    });
                } 
            })
            .catch(err => console.error("Ошибка отправки уведомления в Telegram:", err));
    }

    // Безопасная загрузка данных с защитой от повреждений JSON
    let tasks = [];
    let expenses = [];
    let events = [];

    try {
        tasks = JSON.parse(localStorage.getItem('inflow_tasks')) || [];
        expenses = JSON.parse(localStorage.getItem('inflow_expenses')) || [];
        events = JSON.parse(localStorage.getItem('inflow_events')) || [];
    } catch (e) {
        console.warn("Обнаружена ошибка в сохраненных данных LocalStorage. Память очищена для стабильной работы.", e);
        tasks = [];
        expenses = [];
        events = [];
    }

    function saveData() {
        try {
            localStorage.setItem('inflow_tasks', JSON.stringify(tasks));
            localStorage.setItem('inflow_expenses', JSON.stringify(expenses));
            localStorage.setItem('inflow_events', JSON.stringify(events));
        } catch(e) {
            console.error("Не удалось сохранить данные в LocalStorage:", e);
        }
    }

    // Переключение вкладок
    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (btnElement) {
            btnElement.classList.add('active');
        }
    }

    // Авто-маппинг участников и их тегов
    function resolveTelegramTag(ownerName) {
        if (!ownerName) return { display: 'Не указан', tg: 'Не указан' };
        
        const lowerName = String(ownerName).trim().toLowerCase();
        
        if (lowerName === 'таня' || lowerName === 'татьяна') {
            return { display: 'Таня', tg: '@anghel_tatiana' };
        }
        if (lowerName === 'андрей') {
            return { display: 'Андрей', tg: '@guitaristishe' };
        }
        if (lowerName === 'серж' || lowerName === 'сергей' || lowerName === 'серега' || lowerName === 'серёга') {
            return { display: 'Серж', tg: '@Serjblacknote' };
        }
        
        return { display: ownerName, tg: ownerName };
    }

    // --- ЛОГИКА ЗАДАЧ ---
    function renderTasks() {
        const tbody = document.getElementById('tasksTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        tasks.forEach((task, index) => {
            let displayPriority = task.priority;
            if (task.priority === "Высокий") displayPriority = "🔴 Высокий";
            else if (task.priority === "Средний") displayPriority = "🟡 Средний";
            else if (task.priority === "Низкий") displayPriority = "🟢 Низкий";

            let ownerText = task.owner;
            if (task.ownerTg && task.ownerTg.startsWith('@') && !task.owner.includes('@')) {
                ownerText = `${task.owner} (${task.ownerTg})`;
            }

            tbody.innerHTML += `
                <tr>
                    <td><b>${task.name}</b></td>
                    <td>${ownerText}</td>
                    <td>${task.deadline || '—'}</td>
                    <td>${task.status}</td>
                    <td>${displayPriority}</td>
                    <td><div class="comment-cell" contenteditable="true" onblur="updateTaskComment(${index}, this)">${task.comment || ''}</div></td>
                    <td><button class="delete-btn" onclick="deleteTask(${index})">×</button></td>
                </tr>`;
        });
    }

    function updateTaskComment(index, el) {
        if(tasks[index]) {
            tasks[index].comment = el.innerText;
            saveData();
        }
    }

    function addTask() {
        const name = document.getElementById('taskName').value.trim();
        const ownerInput = document.getElementById('taskOwner').value.trim() || 'Не указан';
        const deadline = document.getElementById('taskDeadline').value;
        const status = document.getElementById('taskStatus').value;
        const priority = document.getElementById('taskPriority').value;
        const comment = document.getElementById('taskComment').value.trim();

        if (!name) return alert("Введите название задачи");

        const userMapping = resolveTelegramTag(ownerInput);

        tasks.push({ 
            name, 
            owner: userMapping.display, 
            ownerTg: userMapping.tg, 
            deadline, 
            status, 
            priority, 
            comment 
        });
        saveAndRender();

        let priorityIcon = priority === "Высокий" ? "🔴" : (priority === "Средний" ? "🟡" : "🟢");
        let statusIcon = status === "Ожидание" ? "⚠️" : (status === "Готово" ? "✅" : "⏳");

        let message = `📝 Добавлена новая задача!\n\nЧто: ${name}\nКто делает: ${userMapping.tg}\nДедлайн: ${deadline || 'Не указан'}\nПриоритет: ${priorityIcon} ${priority}\nСтатус: ${statusIcon} ${status}`;
        if(comment) message += `\nЗаметка: ${comment}`;
        sendTelegram(message);

        document.getElementById('taskName').value = '';
        document.getElementById('taskOwner').value = '';
        document.getElementById('taskComment').value = '';
    }

    function deleteTask(index) {
        if(!tasks[index]) return;
        const completedTask = tasks[index];
        tasks.splice(index, 1);
        saveAndRender();

        let priorityIcon = completedTask.priority === "Высокий" ? "🔴" : (completedTask.priority === "Средний" ? "🟡" : "🟢");
        let targetTg = completedTask.ownerTg || completedTask.owner;

        let message = `✅ ЗАДАЧА УСПЕШНО ЗАВЕРШЕНА!\n\n• Название: ${completedTask.name}\n• Исполнитель: ${targetTg}\n• Была запланирована до: ${completedTask.deadline || '—'}\n• Приоритет: ${priorityIcon} ${completedTask.priority}`;
        if(completedTask.comment) message += `\n• Финальные заметки: ${completedTask.comment}`;
        
        sendTelegram(message);
    }

    // --- ЛОГИКА КАЛЕНДАРЯ ---
    function renderEvents() {
        const tbody = document.getElementById('calendarTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        events.sort((a, b) => new Date(a.date) - new Date(b.date));
        events.forEach((ev, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><span class="event-tag">${ev.date || '—'}</span></td>
                    <td><b>${ev.name}</b></td>
                    <td>${ev.location}</td>
                    <td><div class="comment-cell" contenteditable="true" onblur="updateEventComment(${index}, this)">${ev.comment || ''}</div></td>
                    <td><button class="delete-btn" onclick="deleteEvent(${index})">×</button></td>
                </tr>`;
        });
    }

    function updateEventComment(index, el) {
        if(events[index]) {
            events[index].comment = el.innerText;
            saveData();
        }
    }

    function addEvent() {
        const name = document.getElementById('eventName').value.trim();
        const date = document.getElementById('eventDate').value;
        const location = document.getElementById('eventLocation').value.trim() || 'Не указано';
        const comment = document.getElementById('eventComment').value.trim();

        if (!name || !date) return alert("Введите дату и название события");
        
        events.push({ date, name, location, comment });
        saveAndRender();

        let message = `Добавлено мероприятие в Календарь!\n\nСобытие: ${name}\nКогда: ${date}\nГде: ${location}`;
        if(comment) message += `\nДетали: ${comment}`;
        sendTelegram(message);

        document.getElementById('eventName').value = '';
        document.getElementById('eventLocation').value = '';
        document.getElementById('eventComment').value = '';
    }

    function deleteEvent(index) {
        if(!events[index]) return;
        const deleted = events[index];
        events.splice(index, 1);
        saveAndRender();
        sendTelegram(`Событие отменено/удалено: "${deleted.name}" (${deleted.date})`);
    }

    // --- ЛОГИКА РАСХОДОВ ---
    function renderExpenses() {
        const tbody = document.getElementById('expensesTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        let total = 0;
        expenses.forEach((exp, index) => {
            total += Number(exp.amount || 0);
            tbody.innerHTML += `
                <tr>
                    <td>${exp.date || '—'}</td>
                    <td>${exp.category}</td>
                    <td>${exp.desc}</td>
                    <td>${exp.amount} MDL</td>
                    <td>${exp.paidBy}</td>
                    <td>
