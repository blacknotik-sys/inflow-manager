<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFlow Secure Manager</title>
    <style>
        :root { --bg-color: #121212; --panel-bg: #1e1e1e; --accent-color: #ff3366; --text-color: #e0e0e0; --border-color: #333; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        
        /* Экран авторизации */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #auth-screen input { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; }
        #auth-screen button { padding: 15px 30px; margin-top: 10px; background: var(--accent-color); border: none; color: white; border-radius: 8px; cursor: pointer; }

        /* Основной контент */
        #app-body { display: none; }
        .container { max-width: 1000px; margin: 0 auto; }
        .tab-content { display: none; background: var(--panel-bg); padding: 20px; border-radius: 10px; margin-top: 20px; }
        .tab-content.active { display: block; }
        .btn-nav { padding: 10px; background: #333; color: white; border: none; cursor: pointer; margin-right: 5px; }
        .btn-nav.active { background: var(--accent-color); }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>🔒 Введите пароль доступа</h2>
    <input type="password" id="passInput" placeholder="Пароль" autofocus>
    <button onclick="checkPassword()">Войти</button>
    <p id="errorMsg" style="color: #ff3333;"></p>
</div>

<div id="app-body" class="container">
    <header>
        <h1>INFLOW Secure</h1>
        <button onclick="logout()" style="float:right;">Выйти</button>
    </header>

    <div style="margin-bottom: 20px;">
        <button class="btn-nav active" onclick="showTab('calendar', this)">Календарь</button>
        <button class="btn-nav" onclick="showTab('finance', this)">Финансы</button>
    </div>

    <div id="calendar" class="tab-content active">
        <h3>Календарь</h3>
        </div>

    <div id="finance" class="tab-content">
        <h3>Финансы</h3>
        </div>
</div>

<script>
    // ПРОВЕРКА ПАРОЛЯ
    function checkPassword() {
        const pass = document.getElementById('passInput').value;
        if (pass === "1111") {
            localStorage.setItem('inflow_auth', 'true');
            initAuthorizedApp();
        } else {
            document.getElementById('errorMsg').innerText = "❌ Неверный пароль!";
        }
    }

    function logout() {
        localStorage.removeItem('inflow_auth');
        location.reload();
    }

    function initAuthorizedApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-body').style.display = 'block';
        // Здесь запускается вся логика (загрузка данных, рендер таблиц)
        console.log("Приложение загружено");
    }

    // Проверка сессии при загрузке
    if (localStorage.getItem('inflow_auth') === 'true') {
        initAuthorizedApp();
    }

    function showTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
